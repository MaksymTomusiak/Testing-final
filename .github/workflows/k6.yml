name: k6 Performance Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/Api/**"
      - "tests/Tests.K6/**"

  workflow_dispatch:

jobs:
  k6:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: garden_planner
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Start API
        env:
          ASPNETCORE_URLS: http://localhost:5067
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=garden_planner;Username=postgres;Password=postgres"
        run: dotnet run --project src/Api --no-build --no-launch-profile > api.log 2>&1 &

      - name: Wait for API readiness
        run: |
          echo "Waiting for API to become ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5067/api/Gardens > /dev/null 2>&1; then
              echo "API is ready!"
              exit 0
            fi
            echo "  attempt $i/60..."
            sleep 2
          done
          echo "API failed to become ready. API Logs:"
          cat api.log
          exit 1

      - name: Run k6 Smoke Test
        run: k6 run -e BASE_URL=http://localhost:5067 tests/Tests.K6/smoke.js --summary-export=smoke_results.json

      - name: Run k6 Load Test
        run: k6 run -e BASE_URL=http://localhost:5067 tests/Tests.K6/load_test.js --summary-export=load_results.json

      - name: Run k6 Stress Test
        run: k6 run -e BASE_URL=http://localhost:5067 tests/Tests.K6/stress.js --summary-export=stress_results.json

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: |
            *.json
            tests/Tests.K6/*.html
